baseURL = 'https://kimchibot.com/'
languageCode = 'en-us'
title = 'KimchiBot'
theme = 'PaperMod'

[pagination]
  pagerSize = 100

[params]
  favicon = "/favicon.svg"
  description = "Engineering notes on building crypto trading bots with Python and AI coding tools. Bug write-ups, exchange API gotchas, and what I learned from each failed strategy."
  author = "KimchiBot"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  defaultTheme = "dark"
  disableThemeToggle = true

  [params.homeInfoParams]
    Title = "KimchiBot"
    Content = "Engineering notes on building crypto trading bots with Python, ccxt, and AI coding tools. Bug write-ups, exchange API gotchas, strategy post-mortems, and lessons from each one I had to kill."

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/kimchibot_x"

  [params.footer]
    text = "[Privacy](/privacy/) · [Disclaimer](/disclaimer/)"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    lineNos = true
    style = "monokai"
