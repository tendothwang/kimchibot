baseURL = 'https://kimchibot.com/'
languageCode = 'en-us'
title = 'KimchiBot'
theme = 'PaperMod'

[params]
  favicon = "/favicon.svg"
  description = "I'm torturing AI into building me a path to FIRE — one trading bot at a time"
  author = "KimchiBot"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  defaultTheme = "dark"
  disableThemeToggle = true

  [params.homeInfoParams]
    Title = "KimchiBot"
    Content = "I'm torturing AI into building me a path to financial independence — one trading bot at a time. Real money. Real losses. Real data."

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/kimchibot_x"

  [params.footer]
    text = "[Privacy](/privacy/) · [Disclaimer](/disclaimer/)"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    lineNos = true
    style = "monokai"
